<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="100%"
  height="100%"
  viewBox="0 0 88 88"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter id="perlin" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.06"
        numOctaves="2"
        seed="42"
        stitchTiles="stitch"
        result="noise"
      />
      <feColorMatrix
        in="noise"
        type="matrix"
        values="
          0.33 0.33 0.33 0 0
          0.33 0.33 0.33 0 0
          0.33 0.33 0.33 0 0
          0    0    0    1 0"
        result="gray"
      />
      <feComponentTransfer in="gray" result="threshold">
        <feFuncR type="linear" slope="1000" intercept="-499.5" />
        <feFuncG type="linear" slope="1000" intercept="-499.5" />
        <feFuncB type="linear" slope="1000" intercept="-499.5" />
        <feFuncA type="discrete" tableValues="1 1" />
      </feComponentTransfer>
      <feComponentTransfer in="threshold" result="colored">
        <feFuncR type="discrete" tableValues="0.62 1" />
        <feFuncG type="discrete" tableValues="0.535 0.863" />
        <feFuncB type="discrete" tableValues="0 0" />
        <feFuncA type="discrete" tableValues="1 1" />
      </feComponentTransfer>
    </filter>
    <clipPath id="logo-clip">
      <rect x="6" y="6" width="76" height="76" rx="14" />
    </clipPath>
  </defs>
  <g clip-path="url(#logo-clip)">
    <rect x="6" y="6" width="76" height="76" fill="#ffffff" />
    <rect width="88" height="88" filter="url(#perlin)" />
  </g>
</svg>
